<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>История нашей любви ❤️</title>
  <!-- Swiper CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <!-- Иконки для плеера (Font Awesome) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Arial', sans-serif;
      background: #fce4ec;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      position: relative;
    }

    /* Заголовок */
    .main-title {
      text-align: center;
      font-size: 2.8rem;
      font-weight: 700;
      color: #c2185b;
      margin-bottom: 20px;
      text-shadow: 0 2px 12px rgba(194, 24, 91, 0.2);
      letter-spacing: 1px;
    }
    .main-title span {
      background: #fff;
      padding: 0 24px;
      border-radius: 50px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      display: inline-block;
    }

    /* Слайдер */
    .swiper {
      width: 100%;
      height: 600px;
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      background: #fff;
    }

    .swiper-slide {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #fff;
    }

    .swiper-slide img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.6);
      transition: filter 0.3s;
    }

    .slide-content {
      position: relative;
      z-index: 2;
      max-width: 80%;
      padding: 30px 28px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(6px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .slide-content h2 {
      font-size: 2.4rem;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }

    .slide-content p {
      font-size: 1.2rem;
      line-height: 1.6;
      font-weight: 300;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
      margin: 0;
    }

    .title-slide .slide-content {
      background: rgba(194, 24, 91, 0.5);
      backdrop-filter: blur(6px);
      border-color: #f8bbd0;
    }
    .title-slide .slide-content h2 {
      font-size: 3rem;
    }

    /* Кастомная навигация внизу */
    .custom-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .custom-nav button {
      padding: 12px 32px;
      background: #c2185b;
      color: #fff;
      border: none;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s, transform 0.1s;
      box-shadow: 0 6px 20px rgba(194, 24, 91, 0.3);
      letter-spacing: 0.5px;
      min-width: 160px;
    }

    .custom-nav button:hover {
      background: #ad1457;
      transform: scale(1.02);
    }
    .custom-nav button:active {
      transform: scale(0.97);
    }
    .custom-nav button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .month-indicator {
      font-size: 1.3rem;
      font-weight: 500;
      color: #c2185b;
      background: #fff;
      padding: 8px 24px;
      border-radius: 60px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      min-width: 120px;
      text-align: center;
    }

    /* ---------- МУЗЫКАЛЬНЫЙ ПЛЕЕР (плавающая кнопка) ---------- */
    .music-player {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      padding: 10px 16px 10px 14px;
      border-radius: 60px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      transition: all 0.3s ease;
    }
    .music-player:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    .music-player button {
      background: #c2185b;
      border: none;
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.2s;
      box-shadow: 0 4px 12px rgba(194, 24, 91, 0.4);
    }
    .music-player button:hover {
      background: #ad1457;
    }

    .music-player .track-name {
      font-size: 0.9rem;
      font-weight: 500;
      color: #333;
      max-width: 120px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .music-player .volume-icon {
      color: #c2185b;
      font-size: 1.2rem;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .music-player .volume-icon:hover {
      opacity: 1;
    }

    /* Адаптив для плеера */
    @media (max-width: 600px) {
      .music-player {
        bottom: 20px;
        right: 20px;
        padding: 8px 12px 8px 10px;
      }
      .music-player button {
        width: 38px;
        height: 38px;
        font-size: 1rem;
      }
      .music-player .track-name {
        max-width: 80px;
        font-size: 0.8rem;
      }
      .music-player .volume-icon {
        font-size: 1rem;
      }
    }

    /* Адаптив слайдера */
    @media (max-width: 768px) {
      .swiper {
        height: 500px;
      }
      .slide-content h2 {
        font-size: 1.8rem;
      }
      .slide-content p {
        font-size: 1rem;
      }
      .slide-content {
        padding: 20px 16px;
        max-width: 90%;
      }
      .main-title {
        font-size: 2rem;
      }
      .custom-nav button {
        padding: 10px 20px;
        font-size: 1rem;
        min-width: 120px;
      }
      .month-indicator {
        font-size: 1rem;
        padding: 6px 16px;
        min-width: 80px;
      }
    }

    @media (max-width: 480px) {
      .swiper {
        height: 420px;
      }
      .slide-content h2 {
        font-size: 1.4rem;
      }
      .slide-content p {
        font-size: 0.9rem;
      }
      .custom-nav {
        gap: 12px;
      }
      .custom-nav button {
        padding: 8px 16px;
        font-size: 0.9rem;
        min-width: 100px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="main-title"><span>❤️ Наша история ❤️</span></div>

    <!-- Слайдер -->
    <div class="swiper mySwiper">
      <div class="swiper-wrapper" id="swiperWrapper">
        <!-- слайды генерируются JS -->
      </div>
    </div>

    <!-- Навигация -->
    <div class="custom-nav">
      <button id="prevMonthBtn" disabled>◀ Предыдущий</button>
      <span class="month-indicator" id="monthIndicator">1 / 29</span>
      <button id="nextMonthBtn">Следующий ▶</button>
    </div>
  </div>

  <!-- Плавающий музыкальный плеер -->
  <div class="music-player" id="musicPlayer">
    <button id="playPauseBtn" title="Включить / Выключить музыку">
      <i class="fas fa-play"></i>
    </button>
    <span class="track-name" id="trackName">Название трека</span>
    <span class="volume-icon" id="muteBtn" title="Выключить звук">
      <i class="fas fa-volume-up"></i>
    </span>
  </div>

  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <script>
    // ---------- ДАННЫЕ ДЛЯ СЛАЙДОВ ----------
    const titleSlide = {
      title: 'СЕГОДНЯ НАМ 2 ГОДА 🥂',
      text: 'Два года счастья, смеха и любви. Спасибо, что ты у меня есть! Я так сильно люблю тебя 💕',
      image: 'images/title.jpg'
    };

    // 29 месяцев (заполните своими)
    const monthsData = [
      { title: 'Декабрь 23', text: 'Первый месяц нашего знакомства. К огромному сожалению я не могу найти фотографии с того месяца, но это был потрясающий месяц. Мы только только узнавали друг друга. Вы были прекрасны, прогулки по школе, разговор тем вечером на лавочке. Вы приходили ко мне в гости, а на этой фотке вы пришли с Дариной неожиданно. Вы еще тогда были бусечкой, хоть и были ёжиком)', image: 'images/1.jpeg' },
      { title: 'Январь 24', text: 'Разговоры про бесконечность, прогулки после школы до вашего дома. С каждым днем я влюблялся сильнее, но не хотел в это верить. Я видел в вас (и вижу до сих пор) бесконечно интересного чеовека. Я был счастлив проводить с вами время. Тогда я всё больше и больше убеждался что вы намного умнее многих людей с кем я знаком', image: 'images/2.jpeg' },
      { title: 'Февраль 24', text: 'Я узнал вашу квартиру) Это было очень нагло и хитро, но это было круто) Я помню как мы созванивались. На моей памяти мы в этот месяц начали чаще созваниваться. Вы были ежиком, а мы очковали, хахаха', image: 'images/3.jpeg' },
      { title: 'Март 24', text: 'Поездка в москву вам запомнилась не очень и мы уже много раз обсуждали это, поэтому я хочу здесь вспомнить как мы болтали ночью в поезде. Вы были прекрасны, я чувсвовал что я хочу всегда быть с вами. Боялся вас потерять, потерятьэти красивые голубые глаза. А ближе к концу марта я получил, наверное, одно из самых главных для меня сообщений.', image: 'images/4.jpeg' },
      { title: 'Апрель 24', text: 'Куст Бенжамина, переписки. Я начал влюбляться сильнее. На это все повлияло сообщение с прошлого месяца. Я очень хотел быть рядом с вами. А еще в этом месяце у нас появилась ваша первая "легальная" фотография, вы её в вк выложили. Красавица моя) сейчас пишу этот текст, улыбаюсь и любуюсь этой фотографией с телефона', image: 'images/5.jpeg' },
      { title: 'Май 24', text: 'Прогулки, цветы, колено и конечно же вальс. Я любил вас самой искренной юношеской любовью. А ваш лед начал потихоньку таять) Мы были буськами. Помню как ходил рвать вам сирень) Помню как сидел и разбирался с этим букетом, потому что отрезал с маленьким стволом. Из-за этого букет постоянно распадался. Бесились, но очень хотели подарить его вам. Мама уже спала, пока я собирал она один раз встала, заглянгула в комнату, улыбнулась и пошла дальше спать.', image: 'images/6.jpeg' },
      { title: 'Июнь 24', text: 'Месяц перед отношениями. Сколько всего было... Прогулки до поздна, просмотр аркейна, поцелуи на лавочке, цветы. Я был каждому дню, проведенному с вами. Каждый день это бесконечный поток эмоций. Я любил вас уже пиздец как сильно. Вы потрясающая девушка и я безумно счастлив что встретил вас.', image: 'images/7.jpeg' },
      { title: 'Июль 24', text: '3 июля. Ночь. Эту ночь я запомню навсегда. Я был безумно счастлив, я хотел кричать от счастья на весь мир. И весь июнь прогулки, поцелуи. Я хотел всегда быть рядом и никогда вас не отпускать. Сегодня, в этот день, 3 июля, началась история наших прекрсных отношений.', image: 'images/8.jpeg' },
      { title: 'Август 24', text: 'Тяжелый месяц. Разъезд, самые первые дни с осознанием что мы еще долго не встретимся. Но мы справлялись как могли. Вы были рядом, пусть и не физически. Нам обоим было тяжело, но каждый день мы напоминали друг другу как сильно мы любим, и это спасало.', image: 'images/9.jpeg' },
      { title: 'Сентябрь 24', text: 'Первый месяц на расстоянии. Тяжело, но мы начинаем потихоньку привыкать и учиться быть вместе когда не рядом. Этот месяц многое значил для меня, мы научились справляться с эмоциями от разлуки и радовать друг друга на расстоянии. Вы моя бусьтка, и я вас люблю)', image: 'images/10.jpeg' },
      { title: 'Октябрь 24', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Ноябрь 24', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Декабрь 24', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Январь 25', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Февраль 25', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Март 25', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Апрель 25', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Май 25', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Июнь 25', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Июль 25', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Август 25', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Сентябрь 25', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Октябрь 25', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Ноябрь 25', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Декабрь 25', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Январь 26', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Февраль 26', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Март 26', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Апрель 26', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Май 26', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Июнь 26', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      { title: 'Июль 26', text: 'Наши первые прогулки...', image: 'https://via.placeholder.com/960x600/ff8a80/fff?text=Месяц+2' },
      
      
      // ... добавьте остальные по аналогии (всего 29)
    ];
    // Дополняем до 29 (если меньше)
    for (let i = monthsData.length + 1; i <= 29; i++) {
      monthsData.push({
        title: `Месяц ${i}`,
        text: `Наш ${i}-й месяц вместе. ❤️`,
        image: `https://via.placeholder.com/960x600/d7ccc8/fff?text=Месяц+${i}`
      });
    }

    const allSlides = [titleSlide, ...monthsData];

    // Генерация слайдов
    const wrapper = document.getElementById('swiperWrapper');
    allSlides.forEach((slide, index) => {
      const slideDiv = document.createElement('div');
      slideDiv.className = 'swiper-slide';
      if (index === 0) slideDiv.classList.add('title-slide');
      const img = document.createElement('img');
      img.src = slide.image;
      img.alt = slide.title;
      slideDiv.appendChild(img);
      const content = document.createElement('div');
      content.className = 'slide-content';
      const title = document.createElement('h2');
      title.textContent = slide.title;
      const desc = document.createElement('p');
      desc.textContent = slide.text;
      content.appendChild(title);
      content.appendChild(desc);
      slideDiv.appendChild(content);
      wrapper.appendChild(slideDiv);
    });

    // Инициализация Swiper
    const swiper = new Swiper('.mySwiper', {
      loop: false,
      effect: 'fade',
      fadeEffect: { crossFade: true },
      speed: 600,
      allowTouchMove: true,
      navigation: false,
      pagination: false,
    });

    // Управление кнопками
    const prevBtn = document.getElementById('prevMonthBtn');
    const nextBtn = document.getElementById('nextMonthBtn');
    const indicator = document.getElementById('monthIndicator');
    const totalSlides = allSlides.length;

    function updateUI() {
      const activeIndex = swiper.realIndex;
      if (activeIndex === 0) {
        indicator.textContent = '🏠 Титул';
      } else {
        indicator.textContent = `${activeIndex} / ${totalSlides - 1}`;
      }
      prevBtn.disabled = (activeIndex === 0);
      nextBtn.disabled = (activeIndex === totalSlides - 1);
    }
    prevBtn.addEventListener('click', () => swiper.slidePrev());
    nextBtn.addEventListener('click', () => swiper.slideNext());
    swiper.on('slideChange', updateUI);
    swiper.on('init', updateUI);
    swiper.on('slideChangeTransitionEnd', updateUI);
    setTimeout(updateUI, 100);

    // ---------- МУЗЫКАЛЬНЫЙ ПЛЕЕР ----------
    // 🔽 ЗАМЕНИТЕ ЭТИ ССЫЛКИ НА СВОИ MP3 ФАЙЛЫ 🔽
    const playlist = [
      'music/NL.mp3',
      'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3',
      'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3',
      'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3',
      'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3'
    ];
    // Названия треков (для отображения)
    const trackNames = [
      'Нежная любовь',
      'Мелодия 2',
      'Мелодия 3',
      'Мелодия 4',
      'Мелодия 5'
    ];

    let currentTrack = 0;
    const audio = new Audio();
    audio.loop = false; // будем переключать вручную

    const playBtn = document.getElementById('playPauseBtn');
    const trackNameEl = document.getElementById('trackName');
    const muteBtn = document.getElementById('muteBtn');
    let isPlaying = false;
    let isMuted = false;

    function loadTrack(index) {
      audio.src = playlist[index];
      trackNameEl.textContent = trackNames[index] || `Трек ${index + 1}`;
      if (isPlaying) {
        audio.play().catch(() => {});
      }
    }

    function playNext() {
      currentTrack = (currentTrack + 1) % playlist.length;
      loadTrack(currentTrack);
      if (isPlaying) {
        audio.play().catch(() => {});
      }
    }

    // По окончании трека – переключаем
    audio.addEventListener('ended', playNext);

    // Кнопка Play/Pause
    playBtn.addEventListener('click', () => {
      if (!isPlaying) {
        // если ещё не загружено – загружаем первый трек
        if (!audio.src) {
          currentTrack = 0;
          loadTrack(0);
        }
        audio.play().then(() => {
          isPlaying = true;
          playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        }).catch(err => {
          // Если автозапуск заблокирован – предложим пользователю кликнуть ещё раз
          alert('Нажмите ещё раз, чтобы включить музыку (требуется взаимодействие с сайтом).');
        });
      } else {
        audio.pause();
        isPlaying = false;
        playBtn.innerHTML = '<i class="fas fa-play"></i>';
      }
    });

    // Mute / Unmute
    muteBtn.addEventListener('click', () => {
      isMuted = !isMuted;
      audio.muted = isMuted;
      muteBtn.innerHTML = isMuted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
    });

    // Инициализация: загружаем первый трек, но не играем (ждём клика)
    loadTrack(0);
    audio.pause();
    isPlaying = false;
    playBtn.innerHTML = '<i class="fas fa-play"></i>';
  </script>
</body>
</html>
